name: CI/CD - Finance Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data_ingestion/requirements.txt
          pip install -r postgres/requirements.txt
          pip install flake8 black pytest jsonschema

      - name: Lint (flake8)
        run: flake8 common data_ingestion postgres --max-line-length=120 --extend-ignore=E203

      - name: Check formatting (black --check)
        run: black --check common data_ingestion postgres

      - name: Run unit tests
        run: pytest tests/ -v

  build-and-push-producer-image:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push producer image
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/finance-producer:${{ github.sha }}"
          docker build -f data_ingestion/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          docker tag "$IMAGE" "${{ secrets.ACR_LOGIN_SERVER }}/finance-producer:latest"
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/finance-producer:latest"

  trigger-databricks-job:
    needs: build-and-push-producer-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Databricks medallion job via REST API
        run: |
          curl -X POST "${{ secrets.DATABRICKS_HOST }}/api/2.1/jobs/run-now" \
            -H "Authorization: Bearer ${{ secrets.DATABRICKS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"job_id\": \"${{ secrets.DATABRICKS_JOB_ID }}\"}"

  deploy-adf-pipeline:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ADF pipeline definitions
        run: |
          az datafactory pipeline create \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --factory-name "${{ secrets.ADF_NAME }}" \
            --name pipeline_finance_etl \
            --pipeline @azure/adf/pipeline_finance_etl.json
