version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: finance-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: finance-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: finance-postgres
    environment:
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_pass
      POSTGRES_DB: finance
    ports:
      - "5432:5432"
    volumes:
      - finance_pg_data:/var/lib/postgresql/data
      - ./postgres/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance"]
      interval: 10s
      timeout: 5s
      retries: 10

  producer:
    build:
      context: .
      dockerfile: data_ingestion/Dockerfile
    container_name: finance-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
      STOCK_SYMBOLS: ${STOCK_SYMBOLS:-AAPL,MSFT,GOOGL,TSLA,AMZN}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-15}
    restart: unless-stopped

  spark:
    image: apache/spark:3.5.1
    container_name: finance-spark
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - SPARK_MODE=master
    ports:
      - "8081:8080"   # Spark master UI
      - "7077:7077"
    volumes:
      - ./spark_processing:/app/spark_processing
      - ./common:/app/common
      - ./data:/app/data
    working_dir: /app
    # No long-running command by default -- run jobs manually, see README:
    #   docker exec -it finance-spark spark-submit \
    #     --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1 \
    #     spark_processing/stream_processor.py --kafka-broker kafka:29092 ...
    command: ["tail", "-f", "/dev/null"]

volumes:
  finance_pg_data:
